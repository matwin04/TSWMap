<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Metro Realtime Vehicles</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <link href="styles.css" rel="stylesheet" />
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                font-family: "Inter", "Segoe UI", sans-serif;
                background: #0b0c10;
            }

            #map {
                width: 100%;
                height: 73vh;
                background: #0b0c10;
            }

            /* ---------- Speed HUD ---------- */
        </style>
    </head>
    <body>
        <div id="map"></div>
        <div id="stats">
            <div id="speed-display">
                <span class="value">--</span>
                <span class="unit">km/h</span>
            </div>
            <div id="route-display">
    <div class="row">
        <span class="label">Gradient</span>
        <span class="gradient">--</span>
    </div>
    <div class="row">
        <span class="label">Limit Source</span>
        <span class="limit-source">--</span>
    </div>
    <div class="row">
        <span class="label">Next Limit</span>
        <span class="next-limit">--</span>
    </div>
    <div class="row">
        <span class="label">Next Signal</span>
        <span class="next-signal">--</span>
    </div>
</div>
            <div id="signal-display">
                <div class="row">
                    <span class="label">Signal</span>
                    <span class="aspect">--</span>
                </div>
                <div class="row">
                    <span class="label">Distance</span>
                    <span class="distance">--</span>
                </div>
                <div class="row">
                    <span class="label">Limit</span>
                    <span class="limit">--</span>
                </div>
                <div class="row">
                    <span class="label">Track Max</span>
                    <span class="track-max">--</span>
                </div>
            </div>
        </div>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="script.js"></script>
    </body>
</html>
