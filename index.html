<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metro Realtime Vehicles</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <style>
    :root {
      --panel-bg: rgba(18, 20, 26, 0.88);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-primary: #e8eaef;
      --text-muted: #8b93a3;
      --accent: #3d9dff;
      --late: #ff5c5c;
      --ontime: #3ddc84;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: #0b0c10;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #0b0c10;
    }

    /* ---------- Speed HUD ---------- */
    #speed-display {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 14px 20px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      pointer-events: none;
    }

    #speed-display .value {
      font-family: "SF Mono", "Roboto Mono", Consolas, monospace;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(61, 157, 255, 0.35);
    }

    #speed-display .unit {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    /* ---------- Leaflet popup overrides ---------- */
    .leaflet-popup-content-wrapper {
      background: var(--panel-bg);
      color: var(--text-primary);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
    }

    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
    }

    .leaflet-popup-tip {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 6px;
    }

    .leaflet-popup-content b {
      color: var(--text-muted);
      font-weight: 500;
    }

    .delay-late {
      color: var(--late);
      font-weight: 700;
    }

    .delay-ontime {
      color: var(--ontime);
      font-weight: 700;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="speed-display">
  <span class="value">--</span>
  <span class="unit">km/h</span>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
